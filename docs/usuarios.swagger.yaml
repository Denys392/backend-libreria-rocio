paths:
  /users/profile:
    get:
      summary: Obtener mi perfil
      description: Devuelve los datos del usuario autenticado actualmente (incluye su perfil personal).
      tags:
        - Usuarios
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Perfil obtenido exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 3
                  email:
                    type: string
                    example: cliente2@correo.com
                  active:
                    type: boolean
                    example: true
                  role_id:
                    type: integer
                    example: 4
                  profile:
                    type: object
                    properties:
                      nombre:
                        type: string
                        example: Juan Pérez
                      direccion:
                        type: string
                        example: Av. Larco 456
                      telefono:
                        type: string
                        example: "987654321"
                      imagen:
                        type: string
                        nullable: true
                        example: http://localhost:3000/users/profile/image/image-1718999999999-123456789.jpg
        '401':
          description: Token faltante, expirado o manipulado.
        '403':
          description: Permisos insuficientes para esta acción.
        '404':
          description: El usuario no fue encontrado.

  /users/profile/image/{filename}:
    get:
      summary: Obtener imagen de perfil pública
      description: Sirve el archivo de imagen de perfil de un usuario a partir de su nombre de archivo. Endpoint público, no requiere autenticación.
      tags:
        - Usuarios
      parameters:
        - in: path
          name: filename
          required: true
          schema:
            type: string
          description: Nombre del archivo de imagen almacenado en el servidor.
      responses:
        '200':
          description: Archivo de imagen devuelto exitosamente.
          content:
            image/*:
              schema:
                type: string
                format: binary
        '404':
          description: Imagen no encontrada en la base de datos o el archivo físico no existe en el servidor.

  /users/management:
    get:
      summary: Listar todos los usuarios (gestión administrativa)
      description: Devuelve un listado paginado de todos los usuarios del sistema. Solo accesible para roles OWNER, ADMIN o DEV.
      tags:
        - Usuarios
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Número de página a consultar.
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
            maximum: 100
          description: Cantidad de resultados por página.
      responses:
        '200':
          description: Listado de usuarios obtenido exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_items:
                    type: integer
                    example: 25
                  total_pages:
                    type: integer
                    example: 3
                  current_page:
                    type: integer
                    example: 1
                  limit:
                    type: integer
                    example: 10
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 3
                        email:
                          type: string
                          example: cliente2@correo.com
                        active:
                          type: boolean
                          example: true
                        profile:
                          type: object
                          properties:
                            nombre:
                              type: string
                              example: Juan Pérez
                            imagen:
                              type: string
                              nullable: true
        '401':
          description: Token faltante, expirado o manipulado.
        '403':
          description: Permisos insuficientes para esta acción.

  /users/{id}:
    put:
      summary: Actualizar un usuario
      description: |
        Actualiza los datos de un usuario. El comportamiento depende de quién realiza la petición:
        - **El propio usuario**: puede editar su email, contraseña, nombre, dirección, teléfono e imagen. No puede cambiar su propio rol ni estado `active`.
        - **Staff (OWNER, ADMIN, DEV) editando a otro usuario**: solo puede modificar `email`, `role` y `active`. No puede modificar datos personales ni la foto de otros usuarios.
        Acepta una imagen opcional (multipart/form-data) solo cuando el usuario se edita a sí mismo.
      tags:
        - Usuarios
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID numérico del usuario a actualizar.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: nuevo-correo@correo.com
                password:
                  type: string
                  example: NuevaClave123!
                nombre:
                  type: string
                  example: Juan Pérez
                direccion:
                  type: string
                  example: Av. Larco 456
                telefono:
                  type: string
                  example: "987654321"
                role:
                  type: string
                  description: Solo modificable por staff (OWNER, ADMIN, DEV) sobre otros usuarios.
                  example: SELLER
                active:
                  type: boolean
                  description: Solo modificable por staff (OWNER, ADMIN, DEV) sobre otros usuarios.
                  example: true
                image:
                  type: string
                  format: binary
                  description: Nueva foto de perfil (jpeg, jpg, png o webp, máx. 2MB). Solo si se edita a sí mismo.
      responses:
        '200':
          description: Usuario actualizado correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Usuario actualizado correctamente.
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 3
                      email:
                        type: string
                        example: nuevo-correo@correo.com
        '400':
          description: Datos inválidos o no se enviaron campos válidos/permitidos para actualizar.
        '401':
          description: Token faltante, expirado o manipulado.
        '403':
          description: |
            Acceso denegado. Puede deberse a:
            - Intentar modificar el rol/estado propio sin ser staff.
            - Staff intentando modificar datos personales o foto de otro usuario.
            - Usuario sin permisos intentando editar a otro usuario.
        '404':
          description: El usuario a actualizar no existe.

    delete:
      summary: Eliminar un usuario
      description: Elimina permanentemente a un usuario del sistema. Solo accesible para roles OWNER, ADMIN o DEV.
      tags:
        - Usuarios
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID numérico del usuario a eliminar.
      responses:
        '200':
          description: Usuario eliminado exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Usuario eliminado de manera definitiva exitosamente
        '401':
          description: Token faltante, expirado o manipulado.
        '403':
          description: Permisos insuficientes para esta acción.
        '404':
          description: El usuario a eliminar no existe.